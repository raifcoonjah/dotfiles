# Keep Ctrl+b as the prefix key
set -g prefix C-b

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Switch panes using Alt+Arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes using Ctrl+Alt+Arrow keys
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up resize-pane -U 5
bind -n C-M-Down resize-pane -D 5

# Enable mouse support
set -g mouse on

# Set a status bar at the bottom
set -g status-position bottom
set -g status on
set -g status-interval 2

# Customize status bar colors
set -g status-style fg=white,bg=black
set -g status-left-style fg=green,bg=black
set -g status-right-style fg=green,bg=black

# Display panes and window indices in status bar
set -g status-left-length 30
set -g status-left "[#{=:pane_index}]"

# Display current time and date
set -g clock-mode-colour white
set -g clock-mode-style 24

# Highlight active window in the status bar
setw -g window-status-current-style bg=black,fg=yellow

# Set default-terminal to "screen-256color"
set -g default-terminal "screen-256color"

# Numbering windows and panes
set -g base-index 1
setw -g pane-base-index 1

# Copy and paste with mouse
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

